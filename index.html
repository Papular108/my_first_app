<!DOCTYPE html>
<html>
<head>
    <title>My First App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Hello World!</h1>
    <p>This is my very first full-stack application workspace.</p>
    
    <div class="card greeting-card">
        <h3>Talk to Python:</h3>
        <input type="text" id="user-name" placeholder="Type your name here...">
        <button onclick="sendName()" class="btn btn-blue">Send to Backend</button>
    </div>

    <div class="card calculator-card">
        <h3>Python Calculator:</h3>
        <input type="number" id="num1" placeholder="Num 1" class="num-input">
        <span class="math-operator"> + </span>
        <input type="number" id="num2" placeholder="Num 2" class="num-input">
        <button onclick="calculate()" class="btn btn-green">Add Numbers</button>
    </div>

    <div id="backend-box" class="response-box">
        Waiting for Python backend...
    </div>

    <script>
        // Fetch default welcome message
        fetch('http://127.0.0.1:8000/')
            .then(response => response.json())
            .then(data => {
                document.getElementById('backend-box').innerText = data.message;
            });

        // Function to send name
        function sendName() {
            const nameInput = document.getElementById('user-name').value;
            if (!nameInput) { alert("Please type a name first!"); return; }

            fetch(`http://127.0.0.1:8000/greet?name=${nameInput}`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('backend-box').innerText = data.greeting;
                });
        }

        // Function to send numbers
        function calculate() {
            const n1 = document.getElementById('num1').value;
            const n2 = document.getElementById('num2').value;

            if (n1 === "" || n2 === "") { alert("Please fill in both numbers!"); return; }

            fetch(`http://127.0.0.1:8000/calculate?num1=${n1}&num2=${n2}`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('backend-box').innerText = `Result from Python: ${data.result}`;
                });
        }
    </script>
</body>
</html>
