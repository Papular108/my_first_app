<!DOCTYPE html>
<html>
<head>
    <title>My First App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Hello World!</h1>
    <p>This is my very first full-stack application workspace.</p>
    
    <!-- New Interactive Form Section -->
    <div style="margin: 20px 0; padding: 15px; background: #f4f6f7; border-radius: 8px;">
        <h3>Talk to Python:</h3>
        <input type="text" id="user-name" placeholder="Type your name here..." style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
        <button onclick="sendName()" style="padding: 8px 15px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer;">Send to Backend</button>
    </div>

    <!-- This box holds our backend response messages -->
    <div id="backend-box" style="margin-top: 20px; padding: 15px; background: #e8f8f5; border-radius: 8px; color: #16a085; font-weight: bold;">
        Waiting for Python backend...
    </div>

    <script>
        // 1. Fetch the default welcome message when page loads
        fetch('http://127.0.0.1:8000/')
            .then(response => response.json())
            .then(data => {
                document.getElementById('backend-box').innerText = data.message;
            })
            .catch(error => {
                document.getElementById('backend-box').innerText = "Error connecting to backend";
                console.error("Error:", error);
            });

        // 2. New function to send your typed name to Python
        function sendName() {
            const nameInput = document.getElementById('user-name').value;
            
            if (!nameInput) {
                alert("Please type a name first!");
                return;
            }

            fetch(`http://127.0.0.1:8000/greet?name=${nameInput}`)
                .then(response => response.json())
                .then(data => {
                    // Update our green box with the personalized greeting from Python
                    document.getElementById('backend-box').innerText = data.greeting;
                });
        }
    </script>
</body>
</html>
