<!DOCTYPE html>
<html>
<head>
    <title>My First App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Hello World!</h1>
    <p>This is my very first full-stack application workspace.</p>
    
    <div style="margin: 20px 0; padding: 15px; background: #f4f6f7; border-radius: 8px;">
        <h3>Talk to Python:</h3>
        <input type="text" id="user-name" placeholder="Type your name here..." style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
        <button onclick="sendName()" style="padding: 8px 15px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer;">Send to Backend</button>
    </div>

    <div style="margin: 20px 0; padding: 15px; background: #ebf5fb; border-radius: 8px;">
        <h3>Python Calculator:</h3>
        <input type="number" id="num1" placeholder="Num 1" style="width: 80px; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
        <span style="font-weight: bold; font-size: 18px;"> + </span>
        <input type="number" id="num2" placeholder="Num 2" style="width: 80px; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
        <button onclick="calculate()" style="padding: 8px 15px; background: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; margin-left: 10px;">Add Numbers</button>
    </div>

    <div id="backend-box" style="margin-top: 20px; padding: 15px; background: #e8f8f5; border-radius: 8px; color: #16a085; font-weight: bold;">
        Waiting for Python backend...
    </div>

    <script>
        // Fetch the default welcome message when page loads
        fetch('http://127.0.0.1:8000/')
            .then(response => response.json())
            .then(data => {
                document.getElementById('backend-box').innerText = data.message;
            });

        // Function to send name
        function sendName() {
            const nameInput = document.getElementById('user-name').value;
            if (!nameInput) { alert("Please type a name first!"); return; }

            fetch(`http://127.0.0.1:8000/greet?name=${nameInput}`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('backend-box').innerText = data.greeting;
                });
        }

        // NEW: Function to send numbers to the calculator route
        function calculate() {
            const n1 = document.getElementById('num1').value;
            const n2 = document.getElementById('num2').value;

            if (n1 === "" || n2 === "") {
                alert("Please fill in both numbers!");
                return;
            }

            // Knock on Python's new calculator door
            fetch(`http://127.0.0.1:8000/calculate?num1=${n1}&num2=${n2}`)
                .then(response => response.json())
                .then(data => {
                    // Display the mathematical result sent by Python!
                    document.getElementById('backend-box').innerText = `Result from Python: ${data.result}`;
                });
        }
    </script>
</body>
</html>
